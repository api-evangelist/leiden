      Leiden University has no central public developer portal or documented
      REST API program; most student/institutional systems are gated behind
      SSO. The verifiable, machine-accessible footprint is library-centric: a
      live OAI-PMH 2.0 endpoint for the Scholarly Publications repository
      (Identify verb returns valid XML) and an active open-source GitHub
      organization (LeidenUniversityLibrary) with Islandora, IIIF, and
      Alma-Primo tooling. No endpoints were fabricated; only confirmed live
      URLs are listed below.
