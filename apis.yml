aid: leiden
name: Leiden University
description: >-
  Leiden University (Universiteit Leiden) is the oldest university in the
  Netherlands, founded in 1575, and ranks #141 in the QS World University
  Rankings 2025. Its public, machine-accessible developer footprint is modest
  and centered on its libraries rather than a central developer portal. Leiden
  University Libraries operates an OAI-PMH metadata harvesting endpoint for its
  Scholarly Publications repository and maintains an active open-source GitHub
  organization (LeidenUniversityLibrary) with library, Islandora, and IIIF
  tooling. There is no centrally documented public REST API program; most
  institutional and student systems are gated behind SSO.
